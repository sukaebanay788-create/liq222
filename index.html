<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Futures Screener</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#0b0e11; color:#d1d4dc; height:100vh; overflow:hidden; }
        .container { display:flex; height:100vh; }
        .chart-section { flex:1; display:flex; flex-direction:column; border-right:1px solid #1e2329; }
        .chart-header { padding:12px 16px; background:#151a20; border-bottom:1px solid #1e2329; display:flex; align-items:center; gap:16px; }
        .symbol-info { display:flex; align-items:center; gap:12px; }
        .symbol-name { font-size:18px; font-weight:600; color:#fff; }
        .symbol-price { font-size:16px; font-weight:500; }
        .symbol-change { font-size:14px; padding:2px 8px; border-radius:4px; }
        .positive { color:#0ecb81; } .negative { color:#f6465d; }
        .chart-container { flex:1; position:relative; }
        .screener-section { width:340px; display:flex; flex-direction:column; background:#151a20; }
        .screener-header { padding:12px 16px; border-bottom:1px solid #1e2329; }
        .screener-title { font-size:14px; font-weight:600; color:#fff; margin-bottom:12px; }
        .liquidation-feed { height:15%; overflow-y:auto; padding:8px 12px; border-bottom:1px solid #1e2329; font-size:11px; background:#0f1318; }
        .liquidation-feed-item { display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px solid #1e2329; cursor:pointer; transition:background 0.1s; }
        .liquidation-feed-item:hover { background:#1e2329; }
        .liquidation-feed-item:last-child { border-bottom:none; }
        .liq-symbol { color:#fff; font-weight:500; } .liq-volume { font-family:'Courier New', monospace; }
        .liq-side-sell { color:#f6465d; } .liq-side-buy { color:#0ecb81; }
        .coins-list { flex:1; overflow-y:auto; padding:8px; }
        .coins-list::-webkit-scrollbar { width:4px; } .coins-list::-webkit-scrollbar-track { background:transparent; } .coins-list::-webkit-scrollbar-thumb { background:#2b3139; border-radius:2px; }
        .coin-item { display:grid; grid-template-columns:70px 1fr 1fr 1fr; gap:6px; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:11px; align-items:center; transition:background 0.1s; }
        .coin-item:hover { background:#1e2329; } .coin-item.active { background:#2b3139; }
        .coin-symbol { color:#fff; font-weight:500; } .coin-price { text-align:right; font-family:'Courier New', monospace; } .coin-change { text-align:right; }
        .list-header { display:grid; grid-template-columns:70px 1fr 1fr 1fr; gap:6px; padding:8px 12px; font-size:10px; color:#848e9c; border-bottom:1px solid #1e2329; position:sticky; top:0; background:#151a20; }
        .list-header span { cursor:pointer; user-select:none; } .list-header span:hover { color:#d1d4dc; }
        .text-right { text-align:right; }
        .connection-status { font-size:11px; padding:4px 8px; border-radius:4px; margin-left:auto; }
        .status-connected { background:rgba(14,203,129,0.15); color:#0ecb81; } .status-disconnected { background:rgba(246,70,93,0.15); color:#f6465d; }
        .loading { text-align:center; padding:20px; color:#848e9c; font-size:13px; }
        .timeframe-selector { display:flex; gap:4px; margin-left:16px; }
        .tf-btn { background:#0b0e11; border:1px solid #1e2329; color:#848e9c; padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer; transition:all 0.15s; }
        .tf-btn:hover { border-color:#2b3139; color:#d1d4dc; } .tf-btn.active { background:#f0b90b; border-color:#f0b90b; color:#0b0e11; font-weight:600; }
        #loadMoreBtn { margin-left:8px; background:#0b0e11; border:1px solid #1e2329; color:#848e9c; padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer; transition:all 0.15s; }
        #loadMoreBtn:hover { border-color:#2b3139; color:#d1d4dc; } #loadMoreBtn:disabled { opacity:0.5; cursor:not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="chart-section">
            <div class="chart-header">
                <div class="symbol-info">
                    <span class="symbol-name" id="currentSymbol">BTCUSDT</span>
                    <span class="symbol-price" id="currentPrice">-</span>
                    <span class="symbol-change" id="currentChange">-</span>
                </div>
                <div class="timeframe-selector" id="timeframeSelector">
                    <button class="tf-btn" data-tf="1m">1м</button>
                    <button class="tf-btn" data-tf="5m">5м</button>
                    <button class="tf-btn active" data-tf="15m">15м</button>
                    <button class="tf-btn" data-tf="30m">30м</button>
                    <button class="tf-btn" data-tf="1h">1ч</button>
                    <button class="tf-btn" data-tf="4h">4ч</button>
                    <button id="loadMoreBtn" title="Загрузить ещё историю">📜 Ещё</button>
                </div>
                <span class="connection-status status-disconnected" id="connStatus">Disconnected</span>
            </div>
            <div class="chart-container" id="chart"></div>
        </div>
        <div class="screener-section">
            <div class="screener-header">
                <div class="screener-title">Фьючерсы (<span id="coinsCount">0</span>)</div>
            </div>
            <div class="liquidation-feed" id="liquidationFeed">
                <div style="color:#848e9c;text-align:center;">Ожидание ликвидаций...</div>
            </div>
            <div class="list-header" id="listHeader">
                <span data-sort="symbol">Пара</span>
                <span class="text-right" data-sort="price">Цена</span>
                <span class="text-right" data-sort="change">24ч %</span>
                <span class="text-right" data-sort="change30m">30м %</span>
            </div>
            <div class="coins-list" id="coinsList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
