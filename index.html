<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Futures Screener</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        /* ... все предыдущие стили ... */
        
        /* Добавляем стили для ленты ликвидаций */
        .liquidation-feed {
            height: 15%;
            min-height: 100px;
            border-bottom: 1px solid #1e2329;
            overflow-y: auto;
            padding: 6px 8px;
            font-size: 11px;
            background: #0f1318;
        }
        .liquidation-feed-title {
            color: #848e9c;
            margin-bottom: 4px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .liquidation-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid #1a1f26;
            white-space: nowrap;
        }
        .liquidation-item:last-child {
            border-bottom: none;
        }
        .liq-symbol {
            font-weight: 600;
            color: #fff;
        }
        .liq-side {
            padding: 0 4px;
            border-radius: 2px;
        }
        .liq-side.long { color: #f6465d; }
        .liq-side.short { color: #0ecb81; }
        .liq-volume {
            font-family: monospace;
        }
        .liq-time {
            color: #848e9c;
            font-size: 10px;
        }
        /* Уменьшаем высоту списка монет, чтобы освободить место */
        .coins-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- График (без изменений) -->
        <div class="chart-section">
            <!-- ... -->
        </div>

        <!-- Скринер -->
        <div class="screener-section">
            <div class="screener-header">
                <div class="screener-title">Фьючерсы (<span id="coinsCount">0</span>)</div>
            </div>
            <!-- НОВЫЙ БЛОК: лента последних ликвидаций -->
            <div class="liquidation-feed" id="liquidationFeed">
                <div class="liquidation-feed-title">🔥 Последние ликвидации (&gt;5k)</div>
                <div id="liquidationFeedContent">—</div>
            </div>
            <div class="list-header" id="listHeader">
                <span data-sort="symbol">Пара</span>
                <span class="text-right" data-sort="price">Цена</span>
                <span class="text-right" data-sort="change">24ч %</span>
                <span class="text-right" data-sort="change30m">30м %</span>
            </div>
            <div class="coins-list" id="coinsList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
